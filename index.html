<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebAR - Contador Limpio Moebooru</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      /* Pantalla de inicio con degradado elegante */
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
        z-index: 10000; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        color: white; font-family: 'Segoe UI', sans-serif;
        text-align: center;
      }

      h2 { margin-bottom: 5px; letter-spacing: 2px; color: #4CAF50; }

      /* Botón de inicio */
      #start-btn {
        padding: 20px 60px; background: #4CAF50; color: white;
        border: none; border-radius: 50px; font-weight: bold; font-size: 22px; 
        cursor: pointer; box-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
        margin-bottom: 40px; transition: transform 0.2s;
      }
      #start-btn:active { transform: scale(0.95); }

      /* Contenedor del Contador - Estilo Limpio */
      #counter-wrapper {
        background: rgba(255, 255, 255, 0.03);
        padding: 25px;
        border-radius: 15px;
        border: 1px solid rgba(76, 175, 80, 0.3);
      }

      #counter-wrapper p {
        margin: 0 0 10px 0;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #888;
      }

      /* Imagen del contador con tema Moebooru */
      #counter-img {
        display: block;
        height: 70px; /* Tamaño del número */
        filter: drop-shadow(0 0 5px #4CAF50); /* Brillo suave */
        background: transparent;
      }

      #stop-btn {
        position: fixed; top: 20px; right: 20px; z-index: 10001;
        padding: 12px 25px; background: #ff4444; color: white;
        border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        display: none;
      }

      .mindar-ui-overlay { display: none !important; }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h2>Experiencia AR</h2>
      <p style="opacity: 0.6; margin-bottom: 30px;">Proyecto Folklore</p>
      
      <button id="start-btn">COMENZAR</button>

      <div id="counter-wrapper">
        <p>Visitas Totales</p>
        <img id="counter-img" 
             src="https://count.getloli.com/get/@oscar-ar-jujuy-2026?theme=moebooru" 
             alt="Contador">
      </div>
    </div>

    <button id="stop-btn">DETENER</button>

    <a-scene 
      id="main-scene"
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;"
