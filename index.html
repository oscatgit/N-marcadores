<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebAR - 20 Marcadores con Contador</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 10000; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        color: white; font-family: sans-serif; text-align: center; padding: 20px;
      }
      #start-btn {
        padding: 20px 40px; background: #4CAF50; color: white;
        border: none; border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer;
      }
      #stop-btn {
        position: fixed; top: 20px; right: 20px; z-index: 10001;
        padding: 10px 20px; background: #dc3545; color: white;
        border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
        display: none; font-family: sans-serif;
      }
      /* Estilo del contador */
      #visit-counter {
        margin-top: 20px;
        font-size: 1.1rem;
        color: #FFD700; /* Color dorado para resaltar */
        font-weight: bold;
      }
      .mindar-ui-overlay { display: none !important; }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h2>Experiencia AR Interactiva</h2>
      <p>Apunta a los marcadores para activar el contenido</p>
      <button id="start-btn">COMENZAR</button>
      <div id="visit-counter">Contando visitas...</div>
    </div>

    <button id="stop-btn">DETENER</button>

    <a-scene 
      id="main-scene"
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
      embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets id="video-assets"></a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
      const numTargets = 20;
      const sceneEl = document.querySelector('a-scene');
      const assetsEl = document.querySelector('a-assets');
      const startBtn = document.getElementById('start-btn');
      const stopBtn = document.getElementById('stop-btn');
      const counterEl = document.getElementById('visit-counter');
      const videos = [];

      // --- CONFIGURACIÓN DEL CONTADOR ---
      // Usaremos un servicio alternativo de conteo simple
      const projectName = "oscar_folklore_jujuy_2026"; 

      async function updateCounter(isHit) {
        try {
          // Usamos un servicio de conteo que devuelve el valor actual
          // 'hit' suma uno, 'get' solo consulta
          const action = isHit ? 'hit' : 'get';
          const response = await fetch(`https://api.countapi.xyz/${action}/${projectName}/visitas`);
          const data = await response.json();
          if(data.value) {
            counterEl.innerText = `Visitas totales: ${data.value}`;
          }
        } catch (error) {
          console.error("Error con el contador:", error);
          counterEl.innerText = "Bienvenido a la experiencia";
        }
      }

      // Cargar visitas al abrir la página (solo consulta)
      updateCounter(false);

      // Generación dinámica de los 20 marcadores
      for (let i = 0; i < numTargets; i++) {
        const v = document.createElement('video');
        v.setAttribute('id', `v${i}`);
        v.setAttribute('src', `./videos/v${i}.mp4`);
        v.setAttribute('loop', 'true');
        v.setAttribute('crossorigin', 'anonymous');
        v.setAttribute('playsinline', '');
        v.setAttribute('webkit-playsinline', '');
        v.setAttribute('muted', 'true');
        assetsEl.appendChild(v);
        videos.push(v);

        const entity = document.createElement('a-entity');
        entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);

        const plane = document.createElement('a-plane');
        plane.setAttribute('width', '1');
        plane.setAttribute('height', '1'); 
        plane.setAttribute('position', '0 0 0.1');
        plane.setAttribute('material', `shader: flat; src: #v${i}`);
        plane.setAttribute('video-refresh', '');

        entity.appendChild(plane);
        sceneEl.appendChild(entity);

        entity.addEventListener("targetFound", () => { videos[i].play(); });
        entity.addEventListener("targetLost", () => { videos[i].pause(); });
      }

      AFRAME.registerComponent('video-refresh', {
        tick: function () {
          const mesh = this.el.getObject3D('mesh');
          if (mesh && mesh.material && mesh.material.map) {
            mesh.material.map.needsUpdate = true;
          }
        }
      });

      startBtn.addEventListener('click', () => {
        // Sumar visita real al hacer clic en comenzar
        updateCounter(true);

        document.getElementById('overlay').style.display = 'none';
        stopBtn.style.display = 'block';
        sceneEl.systems["mindar-image-system"].start();

        videos.forEach(v => {
          v.muted = false;
          v.play().then(() => { v.pause(); v.currentTime = 0; });
        });
      });

      stopBtn.addEventListener('click', () => {
        location.reload(); 
      });
    </script>
  </body>
</html>
