<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebAR - 20 Marcadores Dinámicos</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 10000; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        color: white; font-family: sans-serif; text-align: center; padding: 20px;
      }
      #start-btn {
        padding: 20px 40px; background: #4CAF50; color: white;
        border: none; border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer;
      }
      #stop-btn {
        position: fixed; top: 20px; right: 20px; z-index: 10001;
        padding: 10px 20px; background: #dc3545; color: white;
        border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
        display: none; font-family: sans-serif;
      }
      /* Estilo para mostrar el contador en el overlay */
      #visit-counter {
        margin-top: 15px; font-size: 0.9rem; opacity: 0.7;
      }
      .mindar-ui-overlay { display: none !important; }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h2>Experiencia AR (20 Marcadores)</h2>
      <p>Apunta a los marcadores para activar el contenido</p>
      <button id="start-btn">COMENZAR</button>
      <div id="visit-counter">Cargando visitas...</div>
    </div>

    <button id="stop-btn">DETENER</button>

    <a-scene 
      id="main-scene"
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
      embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets id="video-assets"></a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
      const numTargets = 20;
      const sceneEl = document.querySelector('a-scene');
      const assetsEl = document.querySelector('a-assets');
      const startBtn = document.getElementById('start-btn');
      const stopBtn = document.getElementById('stop-btn');
      const counterEl = document.getElementById('visit-counter');
      const videos = [];

      // --- LÓGICA DEL CONTADOR (CountAPI) ---
      // Reemplaza 'mi-proyecto-ar-2026' con un nombre único para tu proyecto
      const namespace = "experiencia-ar-oscar";
      const key = "visitas-totales";

      // Obtener visitas actuales al cargar la página (sin sumar todavía)
      fetch(`https://api.countapi.xyz/get/${namespace}/${key}`)
        .then(res => res.json())
        .then(res => {
          counterEl.innerText = `Visitas totales: ${res.value || 0}`;
        })
        .catch(() => {
          counterEl.innerText = ""; // Si falla, ocultamos el texto
        });

      for (let i = 0; i < numTargets; i++) {
        const v = document.createElement('video');
        v.setAttribute('id', `v${i}`);
        v.setAttribute('src', `./videos/v${i}.mp4`);
        v.setAttribute('loop', 'true');
        v.setAttribute('crossorigin', 'anonymous');
        v.setAttribute('playsinline', '');
        v.setAttribute('webkit-playsinline', '');
        v.setAttribute('muted', 'true');
        assetsEl.appendChild(v);
        videos.push(v);

        const entity = document.createElement('a-entity');
        entity.setAttribute('id', `target${i}`);
        entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);

        const plane = document.createElement('a-plane');
        plane.setAttribute('id', `p${i}`);
        plane.setAttribute('width', '1');
        plane.setAttribute('height', '1'); 
        plane.setAttribute('position', '0 0 0.1');
        plane.setAttribute('material', `shader: flat; src: #v${i}`);
        plane.setAttribute('video-refresh', '');

        entity.appendChild(plane);
        sceneEl.appendChild(entity);

        entity.addEventListener("targetFound", () => { videos[i].play(); });
        entity.addEventListener("targetLost", () => { videos[i].pause(); });
      }

      AFRAME.registerComponent('video-refresh', {
        tick: function () {
          const mesh = this.el.getObject3D('mesh');
          if (mesh && mesh.material && mesh.material.map) {
            mesh.material.map.needsUpdate = true;
          }
        }
      });

      startBtn.addEventListener('click', () => {
        // --- SUMAR VISITA AL COMENZAR ---
        fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`)
          .catch(err => console.error("Error al contar visita", err));

        document.getElementById('overlay').style.display = 'none';
        stopBtn.style.display = 'block';
        sceneEl.systems["mindar-image-system"].start();

        videos.forEach(v => {
          v.muted = false;
          v.play().then(() => { v.pause(); v.currentTime = 0; });
        });
      });

      stopBtn.addEventListener('click', () => {
        location.reload(); 
      });
    </script>
  </body>
</html>
