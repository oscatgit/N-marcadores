<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebAR - Contador Moebooru Fix</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
        z-index: 10000; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        color: white; font-family: sans-serif; text-align: center;
      }
      #start-btn {
        padding: 20px 60px; background: #4CAF50; color: white;
        border: none; border-radius: 50px; font-weight: bold; font-size: 22px; 
        cursor: pointer; box-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
        margin-bottom: 40px;
      }
      #counter-wrapper {
        background: rgba(255, 255, 255, 0.03); padding: 25px;
        border-radius: 15px; border: 1px solid rgba(76, 175, 80, 0.3);
      }
      #counter-wrapper p { margin: 0 0 10px 0; font-size: 0.9rem; color: #888; letter-spacing: 2px; }
      #counter-img { display: block; height: 70px; filter: drop-shadow(0 0 5px #4CAF50); }
      #stop-btn {
        position: fixed; top: 20px; right: 20px; z-index: 10001;
        padding: 12px 25px; background: #ff4444; color: white;
        border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: none;
      }
      .mindar-ui-overlay { display: none !important; }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h2>Experiencia AR</h2>
      <p style="opacity: 0.6; margin-bottom: 30px;">Proyecto Folklore</p>
      <button id="start-btn">COMENZAR</button>
      <div id="counter-wrapper">
        <p>Visitas Totales</p>
        <img id="counter-img" src="https://count.getloli.com/get/@oscar-ar-jujuy-2026?theme=moebooru" alt="Contador">
      </div>
    </div>

    <button id="stop-btn">DETENER</button>

    <a-scene 
      id="main-scene"
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
      embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets id="video-assets"></a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
      // IMPORTANTE: Registrar el componente ANTES de que la escena lo use
      AFRAME.registerComponent('video-refresh', {
        tick: function () {
          const mesh = this.el.getObject3D('mesh');
          if (mesh && mesh.material && mesh.material.map) {
            mesh.material.map.needsUpdate = true;
          }
        }
      });

      const numTargets = 20; 
      const sceneEl = document.querySelector('a-scene');
      const assetsEl = document.querySelector('a-assets');
      const startBtn = document.getElementById('start-btn');
      const stopBtn = document.getElementById('stop-btn');
      const videos = [];

      // Generar elementos
      for (let i = 0; i < numTargets; i++) {
        const v = document.createElement('video');
        v.setAttribute('id', `v${i}`);
        v.setAttribute('src', `./videos/v${i}.mp4`);
        v.setAttribute('loop', 'true');
        v.setAttribute('crossorigin', 'anonymous');
        v.setAttribute('playsinline', '');
        v.setAttribute('webkit-playsinline', '');
        v.setAttribute('muted', 'true');
        assetsEl.appendChild(v);
        videos.push(v);

        const entity = document.createElement('a-entity');
        entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
        const plane = document.createElement('a-plane');
        plane.setAttribute('width', '1');
        plane.setAttribute('height', '1'); 
        plane.setAttribute('position', '0 0 0.1');
        plane.setAttribute('material', `shader: flat; src: #v${i}`);
        plane.setAttribute('video-refresh', ''); // Componente registrado arriba
        entity.appendChild(plane);
        sceneEl.appendChild(entity);

        entity.addEventListener("targetFound", () => { videos[i].play(); });
        entity.addEventListener("targetLost", () => { videos[i].pause(); });
      }

      // Lógica de inicio mejorada
      startBtn.addEventListener('click', () => {
        const scene = document.querySelector('a-scene');
        
        // 1. Ocultar interfaz
        document.getElementById('overlay').style.display = 'none';
        stopBtn.style.display = 'block';

        // 2. Iniciar sistema MindAR
        if (scene.systems["mindar-image-system"]) {
            scene.systems["mindar-image-system"].start();
        }

        // 3. Desbloquear audio de videos
        videos.forEach(v => {
          v.muted = false;
          v.play().then(() => { v.pause(); v.currentTime = 0; }).catch(e => console.log("Audio waiting..."));
        });
      });

      stopBtn.addEventListener('click', () => {
        location.reload(); 
      });
    </script>
  </body>
</html>
